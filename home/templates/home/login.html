{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - WAPANGAJI</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'home/css/login.css' %}">
</head>
<body>
    <div class="login-container">
        <!-- Header Section -->
        <div class="login-header">
            <h1>WAPANGAJI</h1>
            <p>Sign in to your account</p>
        </div>

        <!-- Form Section -->
        <form class="login-form" method="POST" action="{% url 'home:login' %}">
            {% csrf_token %}

            <!-- Messages/Alerts -->
            {% if messages %}
                <div class="alerts">
                    {% for message in messages %}
                        <div class="alert alert-{% if message.tags %}{{ message.tags }}{% else %}info{% endif %}">
                            <i class="fas fa-{% if message.tags == 'error' %}exclamation-circle{% else %}check-circle{% endif %}"></i>
                            <span>{{ message }}</span>
                        </div>
                    {% endfor %}
                </div>
            {% endif %}

            <!-- Username Field -->
            <div class="form-group">
                <label for="username">Username</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    class="form-control" 
                    placeholder="Enter your username"
                    value="{{ username }}"
                    required
                    autofocus
                >
            </div>

            <!-- Password Field -->
            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    class="form-control" 
                    placeholder="Enter your password"
                    required
                >
            </div>

            <!-- Remember Me & Forgot Password -->
            <div class="form-options">
                <div class="remember-me">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Remember me</label>
                </div>
                <a href="{% url 'home:forgot_password' %}" class="forgot-password">Forgot password?</a>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn-login">
                Sign In
            </button>

            <div class="home-link">
                <a href="{% url 'home:index' %}" class="btn-home">
                    <i class="fas fa-home"></i> Back to Home
                </a>
            </div>
        </form>
    </div>
</body>
</html>

{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - WAPANGAJI</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'home/css/forgot_password.css' %}">
</head>
<body>
    <div class="forgot-password-container">
        <div class="forgot-password-box">
            <div class="forgot-password-header">
                <h1>Reset Your Password</h1>
                <p>Enter your email address and we'll send you a link to reset your password</p>
            </div>

            {% if messages %}
                <div class="alerts">
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }}">
                            <i class="fas fa-{% if message.tags == 'error' %}exclamation-circle{% else %}check-circle{% endif %}"></i>
                            <span>{{ message }}</span>
                        </div>
                    {% endfor %}
                </div>
            {% endif %}

            <form method="POST" class="forgot-password-form">
                {% csrf_token %}
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        class="form-control" 
                        placeholder="Enter your email address"
                        required
                        autofocus
                    >
                </div>

                <button type="submit" class="btn-reset">
                    Send Reset Link
                </button>

                <div class="back-to-login">
                    <a href="{% url 'home:login' %}" class="back-link">
                        <i class="fas fa-arrow-left"></i> Back to Login
                    </a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>

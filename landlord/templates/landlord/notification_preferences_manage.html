{% load static %}
<!-- Notification Preferences – Manage Page -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Notification Preferences - WAPANGAJI</title>
    <link rel="stylesheet" href="{% static 'landlord/settings.css' %}">
    <!-- Comment: Modern, responsive CSS for landlord settings -->
</head>
<body>
    <main class="settings-main">
        <h1 class="settings-title">Manage Notification Preferences</h1>
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="message {{ message.tags }}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
        <form method="post" class="settings-card">
            {% csrf_token %}
            <h2>Edit Notification Preferences</h2>
            {{ notif_form.as_p }}
            <button type="submit" name="save_notifications" class="btn btn-primary">Save Notifications</button>
            <!-- Comment: Toggle email/SMS notifications, saves to DB. -->
        </form>
    </main>
</body>
</html>
